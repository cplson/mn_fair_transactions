# Optional: official Airflow image + "airflow standalone" (SQLite, LocalExecutor).
# Avoids host Python/Airflow version drift. UI: http://localhost:8080
# First run prints admin password to container logs.
#
# Usage from repo root:
#   docker compose -f docker-compose.airflow.yml up
#
# DAGs: ./airflow/dags  ->  /opt/airflow/dags
#
# Project mount for pipeline scripts + data (PythonOperator / BashOperator):
#   ./scripts  ->  /opt/airflow/mn_fair/scripts  (read-only)
#   ./data     ->  /opt/airflow/mn_fair/data     (read-write: fair.db, staging, state)
# Scripts use Path(__file__).parents[1] as project root, so they resolve data under mn_fair/.
#
# If tasks fail to write to ./data on the host, set AIRFLOW_UID to your host user id, e.g.:
#   AIRFLOW_UID=$(id -u) docker compose -f docker-compose.airflow.yml up
services:
  airflow:
    image: apache/airflow:3.2.0-python3.12
    user: "${AIRFLOW_UID:-50000}:0"
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    volumes:
      - ./airflow/.docker-home:/opt/airflow
      - ./airflow/dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/mn_fair/scripts:ro
      - ./data:/opt/airflow/mn_fair/data
    command: standalone
